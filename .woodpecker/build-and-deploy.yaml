when:
  - event: push
    branch: main

steps:
  - name: build-and-push
    image: alpine:3
    privileged: true
    commands:
      - apk add --no-cache docker-cli

      - echo "Logging in to registry ..."
      - docker login -u abby -p "${REGISTRY_PASSWORD}" registry.mocalabs.dev

      - echo "Building blog container ..."
      - docker build --no-cache -t registry.mocalabs.dev/mocalabs/blog:${CI_COMMIT_SHA} .

      - echo "Tagging this build as latest ..."
      - docker tag registry.mocalabs.dev/mocalabs/blog:${CI_COMMIT_SHA} registry.mocalabs.dev/mocalabs/blog:latest

      - echo "Pushing tagged container to registry ..."
      - docker push registry.mocalabs.dev/mocalabs/blog:${CI_COMMIT_SHA}
      - docker push registry.mocalabs.dev/mocalabs/blog:latest

      - echo "Done building and pushing blog container to registry. You may now pull this image."
