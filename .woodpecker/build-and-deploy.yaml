when:
  - event: push
    branch: main

steps:
  - name: login
    image: plugins/docker
    settings:
      registry: registry.mocalabs.dev
      username: abby
      password: ${REGISTRY_PASSWORD}

  - name: build-and-push
    image: plugins/docker
    settings:
      registry: registry.mocalabs.dev
      username: abby
      password: ${REGISTRY_PASSWORD}
      tags:
        - registry.mocalabs.dev/mocalabs/blog:latest
        - registry.mocalabs.dev/mocalabs/blog:${CI_COMMIT_SHA}
      dockerfile: Dockerfile
      # insecure: false
      debug: true
      verbose: true
