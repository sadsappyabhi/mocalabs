when:
  - event: [push, pull_request_closed, manual]
    branch: main

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: registry.mocalabs.dev
      repo: registry.mocalabs.dev/mocalabs/blog
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      cache: true
      skip_tls_verify: false
      build_args:
        - COMMIT_SHA=${CI_COMMIT_SHA}
        - COMMIT_AUTHOR_EMAIL=${CI_COMMIT_AUTHOR_EMAIL}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
